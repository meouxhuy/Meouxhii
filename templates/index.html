<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeoU Scan — YouTube Shopping Detector</title>
<link rel="icon" type="image/png" sizes="16x16" href="/static/icons/icon16.png">
<link rel="icon" type="image/png" sizes="128x128" href="/static/icons/icon128.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wdth,wght@100,700&family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.4.0/air-datepicker.css">
<link rel="stylesheet" href="/static/css/index.css">
</head>
<body>

<!-- Animated background orbs -->
<div class="bg-canvas" aria-hidden="true">
  <span class="bg-orb bg-orb-1"></span>
  <span class="bg-orb bg-orb-2"></span>
  <span class="bg-orb bg-orb-3"></span>
  <span class="bg-orb bg-orb-4"></span>
</div>

<!-- Toast notification -->
<div id="meouAlert" class="toast hidden" role="alert">
  <svg class="toast-ico" viewBox="0 0 20 20" fill="currentColor">
    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
  </svg>
  <p id="alertMsg"></p>
</div>

<!-- Mode switch overlay (hamster) -->
<div class="msw-overlay" id="modeSwitchOverlay">
  <div class="msw-box">
    <div aria-label="Hamster in wheel" role="img" class="wheel-and-hamster">
      <div class="wheel"></div>
      <div class="hamster">
        <div class="hamster__body">
          <div class="hamster__head">
            <div class="hamster__ear"></div>
            <div class="hamster__eye"></div>
            <div class="hamster__nose"></div>
          </div>
          <div class="hamster__limb hamster__limb--fr"></div>
          <div class="hamster__limb hamster__limb--fl"></div>
          <div class="hamster__limb hamster__limb--br"></div>
          <div class="hamster__limb hamster__limb--bl"></div>
          <div class="hamster__tail"></div>
        </div>
      </div>
      <div class="spoke"></div>
    </div>
    <p class="msw-label">Đang chuyển chế độ...</p>
  </div>
</div>

<!-- ═══ TOPBAR ═══ -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo-ring">
      <img src="/static/icons/icon64.png" alt="MeoU" class="logo-img">
    </div>
    <div>
      <h1 class="site-name" data-text="MeoU Scan">MeoU Scan</h1>
      <p class="site-sub">A Product of MeoU Studio</p>
    </div>
  </div>
  <div class="topbar-right">
    <div class="user-chip">
      <span class="online-dot"></span>
      <img src="/static/icons/icon128.png" alt="Avatar" class="chip-avatar">
      <span class="chip-name">{{ username }}</span>
    </div>
    <button class="hdr-btn" id="themeToggleTop" title="Đổi giao diện">
      <svg id="sunIconTop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32 1.41-1.41"/>
      </svg>
      <svg id="moonIconTop" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <a href="/logout" class="hdr-btn hdr-btn-danger" title="Đăng xuất">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
    </a>
  </div>
</header>

<!-- ═══ APP LAYOUT ═══ -->
<div class="app-layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <!-- Mode toggle -->
    <div class="sb-block">
      <button id="modeToggle" class="mode-pill">
        <span class="mode-seg mode-seg--left">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zm12.553.106A1 1 0 0014 7v6a1 1 0 00.553.894l2 1A1 1 0 0018 14V6a1 1 0 00-1.447-.894l-2 1z"/></svg>
          TỪNG KÊNH
        </span>
        <span class="mode-seg mode-seg--right">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>
          NHIỀU KÊNH
        </span>
        <span id="modeText" class="sr-only">SCAN TỪNG KÊNH</span>
      </button>
    </div>

    <div class="sb-divider"></div>

    <!-- Date range -->
    <div class="sb-block">
      <p class="sb-lbl">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
        Khoảng thời gian
      </p>
      <div class="dates-row">
        <div class="date-wrap"><span class="date-tag">Từ</span><input type="text" id="startDate" class="date-inp" placeholder="--/--/--"></div>
        <span class="dates-sep">→</span>
        <div class="date-wrap"><span class="date-tag">Đến</span><input type="text" id="endDate" class="date-inp" placeholder="--/--/--"></div>
      </div>
    </div>

    <!-- Link input -->
    <div class="sb-block">
      <p class="sb-lbl">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd"/></svg>
        Link kênh YouTube
      </p>
      <textarea id="linksInput" rows="3" class="link-area" placeholder="Dán link kênh vào đây..."></textarea>
    </div>

    <!-- Scan button -->
    <div class="sb-block">
      <button id="scanBtn" class="scan-btn">
        <span class="scan-pulse" aria-hidden="true"></span>
        <svg class="scan-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/>
        </svg>
        <span class="scan-lbl">Quét Ngay</span>
      </button>
    </div>

    <!-- Progress (single) -->
    <div id="scanProgressContainer" class="hidden sb-block">
      <div class="prog-track"><div id="scanProgressFill" class="prog-fill"></div></div>
      <div class="prog-row">
        <span id="scanProgressLabel" class="shimmer-text">Tiến Trình</span>
        <span id="scanProgressText" class="prog-pct">0%</span>
      </div>
    </div>

    <div class="sb-divider"></div>

    <!-- Action buttons -->
    <div class="sb-block actions-row">
      <button id="saveTempBtn" class="act-btn btn-save hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        Lưu Tạm
      </button>
      <button id="exportBtn" class="act-btn btn-export hidden">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        Xuất Excel
      </button>
    </div>

    <!-- Archive -->
    <div id="archiveContainer" class="hidden sb-block">
      <button id="archiveIconBtn" class="arch-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        <span>Nơi Lưu Trữ</span>
        <span id="archiveBadge" class="arch-badge">0</span>
        <svg class="arch-chev" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
      <div id="archiveDropdown" class="hidden arch-panel">
        <ul id="archiveList" class="arch-list custom-scrollbar"></ul>
        <div class="arch-foot">
          <button id="deleteAllBtn" class="af-btn af-del">Xóa tất cả</button>
          <button id="downloadAllBtn" class="af-btn af-dl">Tải tất cả</button>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── MAIN PANEL ── -->
  <main class="main-panel">

    <!-- Loading -->
    <div id="loading" class="hidden loading-state">
      <div class="ls-rings">
        <div class="ls-ring r1"></div>
        <div class="ls-ring r2"></div>
        <div class="ls-ring r3"></div>
        <img src="/static/icons/icon64.png" alt="" class="ls-logo">
      </div>
      <p id="loadingText" class="ls-text loading-text-anim"></p>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
      <div class="es-icon">
        <svg viewBox="0 0 72 72" fill="none">
          <circle cx="32" cy="32" r="22" stroke="currentColor" stroke-width="2.5" stroke-dasharray="8 4" opacity=".4"/>
          <circle cx="32" cy="32" r="12" stroke="currentColor" stroke-width="2" opacity=".6"/>
          <path d="M50 50l9 9" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity=".4"/>
          <path d="M32 26v6l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>
        </svg>
      </div>
      <h2 class="es-title">Chưa có dữ liệu</h2>
    </div>

    <!-- Results table -->
    <div class="table-shell">
      <table class="res-table">
        <thead>
          <tr class="res-head">
            <th class="th th-date">Ngày</th>
            <th class="th th-link">YouTube Link</th>
            <th class="th th-type">Loại</th>
            <th class="th th-cart">Giỏ Hàng</th>
            <th class="th th-detail">Chi Tiết Sản Phẩm</th>
          </tr>
        </thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.4.0/air-datepicker.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="/static/js/messages.js"></script>
<script src="/static/js/index.js"></script>
</body>
</html>
