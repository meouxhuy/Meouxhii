<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeoU Scan - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-card">
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-[#5a54a4]">MeoU Scan</h2>
            <p class="text-[#5a54a4]/60 font-bold text-sm">Vui lòng đăng nhập để tiếp tục</p>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="meou@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn" id="submitBtn">
                <span class="loader" id="loader"></span>
                <span>Sign In</span>
            </button>
            <p id="errorMessage" class="error-msg"></p>
        </form>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
